<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Ctrl + Mat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[130px] pointer-events-none"></div>

    <div class="bg-slate-800/40 backdrop-blur-xl border border-slate-700/50 w-full max-w-md rounded-2xl p-8 shadow-2xl relative z-10">
        
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="w-16 h-16 bg-slate-700/40 rounded-full flex items-center justify-center mb-3 border border-slate-600/50 p-2">
                <img src="imagenes/escudo-unsis.png" alt="UNSIS" class="w-full h-full object-contain" onerror="this.parentElement.innerHTML=`<i class='fa-solid fa-graduation-cap text-3xl text-amber-500'></i>`">
            </div>
            <span class="text-[10px] font-bold text-amber-500 uppercase tracking-widest">Universidad de la Sierra Sur</span>
            <h2 class="text-2xl font-extrabold text-white mt-1">Bienvenido a Ctrl <span class="text-blue-500">+</span> Mat</h2>
            <p class="text-xs text-slate-400 mt-1">Inicia sesión para solicitar materiales para tus prácticas académicas</p>
        </div>

        <form id="formLogin" class="space-y-5">
            
            <div class="space-y-2">
                <label for="usuario" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider">
                    Matrícula
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
                        <i class="fa-solid fa-user text-sm"></i>
                    </div>
                    <input type="text" id="usuario" name="usuario" required placeholder="Ej. 20260001"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label for="password" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider">
                        Contraseña
                    </label>
                    <a href="#" class="text-xs text-blue-400 hover:underline">¿La olvidaste?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
                        <i class="fa-solid fa-key text-sm"></i>
                    </div>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <button type="submit" 
                class="w-full text-white bg-blue-600 hover:bg-blue-500 focus:ring-4 focus:outline-none focus:ring-blue-800/50 font-semibold rounded-xl text-sm px-5 py-3.5 text-center transition-all shadow-lg shadow-blue-600/20">
                Ingresar al Sistema
            </button>
        </form>
        <div class="mt-6 text-center border-t border-slate-700/40 pt-4">
            <p class="text-xs text-slate-500">¿No tienes cuenta? <a href="#" class="text-blue-400 font-medium hover:underline">Solicita acceso al encargado</a></p>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value;

            try {
                const respuesta = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ usuario, password })
                });

                const resultado = await respuesta.json();

                if (!respuesta.ok) {
                    alert(resultado.error || "Error al iniciar sesión");
                    return;
                }

                localStorage.setItem('usuario', JSON.stringify(resultado.usuario));
                
                alert(`¡Bienvenido(a) ${resultado.usuario.nombre}!`);

                if (resultado.usuario.rol === 'administrador' || resultado.usuario.rol === 'laboratorista') {
                    window.location.href = "administrador.html";
                } else if (resultado.usuario.rol === 'alumno') {
                    window.location.href = "index.html";
                }

            } catch (error) {
                console.error("Error de conexión:", error);
                alert("No se pudo conectar con el servidor backend. Asegúrate de que Node.js esté corriendo.");
            }
        });
    </script>
</body>
</html>
