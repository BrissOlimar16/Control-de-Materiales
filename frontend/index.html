<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ctrl + Mat - UNSIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col justify-between relative overflow-hidden">
    
    <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-blue-600/10 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-emerald-600/10 blur-[120px] pointer-events-none"></div>

    <header class="w-full bg-slate-800/40 backdrop-blur-md border-b border-slate-700/50 px-6 py-4 flex items-center justify-between relative z-20">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap text-amber-500 text-xl"></i>
            <span class="text-xs font-bold text-slate-300 uppercase tracking-wider hidden sm:inline">Portal Estudiante</span>
        </div>
        
        <div class="flex items-center gap-3">
            <a href="historialA.html" 
                class="text-xs font-semibold bg-slate-900 hover:bg-slate-800 text-blue-400 border border-slate-700/80 px-4 py-2 rounded-xl transition-all flex items-center gap-2 shadow-md">
                <i class="fa-solid fa-clock-rotate-left text-sm"></i> Mi Historial
            </a>
            <a href="login.html" 
                class="text-xs font-semibold text-rose-400 hover:bg-rose-500/10 px-3 py-2 rounded-xl transition-all border border-transparent hover:border-rose-500/20">
                <i class="fa-solid fa-right-from-bracket"></i> Salir
            </a>
        </div>
    </header>

    <div class="flex-1 flex items-center justify-center p-4 relative z-10">
        <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 w-full max-w-md rounded-2xl p-8 shadow-2xl text-center">
            
            <div class="flex flex-col items-center mb-6">
                <div class="w-20 h-20 bg-slate-700/50 rounded-full flex items-center justify-center mb-4 border border-slate-600/50 p-2">
                    <img src="imagenes/escudo-unsis.png" alt="UNSIS" class="w-full h-full object-contain" onerror="this.parentElement.innerHTML=`<i class='fa-solid fa-graduation-cap text-3xl text-amber-500'></i>`">
                </div>
                <h1 class="text-xs font-bold text-amber-500 uppercase tracking-widest">Universidad de la Sierra Sur</h1>
                <h2 class="text-3xl font-extrabold text-white mt-1">Ctrl <span class="text-blue-500">+</span> Mat</h2>
                <p class="text-sm text-slate-400 mt-2">¿En qué laboratorio solicitarás material hoy?</p>
            </div>

            <form id="formLaboratorio" method="GET" class="space-y-6 text-left">
                <div>
                    <label for="laboratorio" class="block text-sm font-semibold text-slate-300 mb-2">
                        <i class="fa-solid fa-flask text-blue-500 mr-2"></i>Seleccione el Laboratorio / Centro
                    </label>
                    <div class="relative">
                        <select name="laboratorio" id="laboratorio" required
                            class="w-full bg-slate-900/80 border border-slate-700 text-slate-200 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 appearance-none cursor-pointer transition-all">
                            <option value="" disabled selected class="text-slate-500">Seleccione una opción...</option>
                            <option value="CETI" class="bg-slate-900">CETI (Informática)</option>
                            <option value="CEODON" class="bg-slate-900">CEODON (Odontología)</option>
                            <option value="CPAT" class="bg-slate-900">CPAT (Medicina)</option>
                            <option value="CINA" class="bg-slate-900">CINA (Nutrición)</option>
                            <option value="Hospital Robotizado" class="bg-slate-900">Hospital Robotizado (Salud)</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full text-white bg-blue-600 hover:bg-blue-500 focus:ring-4 focus:outline-none focus:ring-blue-800/50 font-semibold rounded-xl text-sm px-5 py-3.5 text-center flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-600/20 group">
                    Continuar <i class="fa-solid fa-arrow-right text-xs transition-transform group-hover:translate-x-1"></i>
                </button>
            </form>
        </div>
    </div>

    <footer class="w-full text-center py-4 relative z-10">
        <p class="text-[10px] text-slate-600 tracking-wider">Módulo de Solicitudes v1.0 — UNSIS</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const laboratorio = params.get("laboratorio");

        if (laboratorio) {
            document.getElementById("nombreLaboratorio").textContent = laboratorio;
        }

        document.getElementById("formLaboratorio").addEventListener("submit", function(e) {

            e.preventDefault();

            const laboratorio = document.getElementById("laboratorio").value;

            if (laboratorio === "CETI") {
               window.location.href = "formulario.html?laboratorio=" + encodeURIComponent(laboratorio);

            } else {
                alert("Por el momento solo está disponible el laboratorio CETI.");
            }

        });
    </script>

</body>
</html>
